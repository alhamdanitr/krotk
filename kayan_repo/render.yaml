services:
  # 1. لوحة التحكم (Frontend - Next.js)
  - type: web
    name: kurotek-admin
    env: node
    region: frankfurt
    rootDir: admin
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: kurotek-backend
          envVar: RENDER_EXTERNAL_URL

  # 2. السيرفر والباك إند (Backend - NestJS)
  - type: web
    name: kurotek-backend
    env: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate --schema=prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=prisma/schema.prisma && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kurotek-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  # 3. قاعدة البيانات (PostgreSQL)
  - name: kurotek-postgres
    region: frankfurt
    databaseName: kurotekdb
    user: kurotek_admin
